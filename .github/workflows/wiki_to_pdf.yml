name: Generate PDF from Wiki

on:
  schedule:
    - cron: '0 15 * * *' # (UTC 기준 15시 -> 한국 기준 0시) 마다 MD -> PDF 변환
  workflow_dispatch:
  # repository_dispatch:
  #   types: [wiki-updated]

env:
  REPO_OWNER: RobomationLAB # github username 작성
  REPO_NAME: User_Guide_KR # main repository name 작성
  WIKI_REPO_NAME: User_Guide_KR.wiki # wiki repository name 작성
  COMMITTER_NAME: github-actions[bot]
  COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
  BRANCH: main
  GH_TOKEN: ${{ secrets.GH_PAT }}

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          token: ${{ env.GH_TOKEN }}
          lfs: true

      - name: Clone Wiki repository
        run: |
          git clone https://${{ env.GH_TOKEN }}@github.com/${{ env.REPO_OWNER }}/${{ env.WIKI_REPO_NAME }}.git wiki
          cd wiki
          rm -r Home.md _Sidebar.md

          git config user.name "${{ env.COMMITTER_NAME }}"
          git config user.email "${{ env.COMMITTER_EMAIL }}"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            fonts-noto-cjk \
            fonts-noto-cjk-extra \
            fonts-noto-color-emoji \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev
          python3 -m pip install --upgrade pip
          python3 -m pip install weasyprint

      - name: Create HTML header (CSS)
        run: |
          cat > "$GITHUB_WORKSPACE/header.html" << 'EOF'
          <style>
          @page { margin: 1.5cm; @bottom-center { content: counter(page); } }
          body { font-family: "Noto Sans CJK KR", "Noto Color Emoji", sans-serif; line-height: 1.5; font-size: 11pt; color: #222; }
          h1, h2, h3, h4 { font-family: "Noto Sans CJK KR", sans-serif; }
          h1 { border-bottom: 2px solid #444; padding-bottom: 4px; }
          h2 { border-bottom: 1px solid #bbb; padding-bottom: 2px; margin-top: 1.4em; }
          code, pre { font-family: "Noto Sans Mono CJK KR", monospace; }
          pre { background: #f5f5f5; padding: 10px; border-radius: 4px; white-space: pre-wrap; word-wrap: break-word; }
          code { background: #f0f0f0; padding: 1px 4px; border-radius: 3px; }
          pre code { background: none; padding: 0; }
          img { max-width: 100%; height: auto; vertical-align: middle; }
          table { border-collapse: collapse; margin: 8px 0; }
          th, td { border: 1px solid #ccc; padding: 4px 10px; }
          th { background: #f0f0f0; }
          hr { border: none; border-top: 1px solid #ddd; margin: 1.2em 0; }
          </style>
          EOF

      - name: Generate PDFs
        run: |
          set -euo pipefail

          # (안정) 한글 파일명/경로 로케일
          export LANG=C.UTF-8
          export LC_ALL=C.UTF-8

          export HEADER="$GITHUB_WORKSPACE/header.html"

          # 단일 .md → PDF (weasyprint 가 raw URL 이미지를 네트워크로 fetch)
          build_pdf () {
            local IN_MD="$1"
            local OUT_PDF="$2"
            pandoc "$IN_MD" \
              --standalone \
              --from gfm \
              --include-in-header="$HEADER" \
              --pdf-engine=weasyprint \
              --metadata title="$(basename "$OUT_PDF" .pdf)" \
              --metadata lang=ko \
              -o "$OUT_PDF"
          }
          export -f build_pdf

          cd wiki

          # -----------------------------------------
          # RobomationLAB-코딩-가이드.pdf (그룹 병합)
          # GUIDE_PAGES=("코딩-가이드" "코딩-규칙" "커스텀-함수")

          # echo "# RobomationLAB 코딩 가이드" > RobomationLAB-코딩-가이드.md
          # echo "" >> RobomationLAB-코딩-가이드.md
          # for page in "${GUIDE_PAGES[@]}"; do
          #   file="${page}.md"
          #   if [ -f "$file" ]; then
          #     echo "# $page" >> RobomationLAB-코딩-가이드.md
          #     echo "" >> RobomationLAB-코딩-가이드.md
          #     cat "$file" >> RobomationLAB-코딩-가이드.md
          #     echo "" >> RobomationLAB-코딩-가이드.md
          #     echo "---" >> RobomationLAB-코딩-가이드.md
          #     echo "" >> RobomationLAB-코딩-가이드.md
          #   fi
          # done

          # build_pdf "RobomationLAB-코딩-가이드.md" "RobomationLAB-코딩-가이드.pdf"

          # -----------------------------------------
          # 구성-요소-및-사용-방법.pdf (그룹 병합)
          # USAGE_PAGES=("상단-메뉴" "에디터" "미리보기")

          # echo "# 구성 요소 및 사용 방법" > 구성-요소-및-사용-방법.md
          # echo "" >> 구성-요소-및-사용-방법.md
          # for page in "${USAGE_PAGES[@]}"; do
          #   file="${page}.md"
          #   if [ -f "$file" ]; then
          #     echo "# $page" >> 구성-요소-및-사용-방법.md
          #     echo "" >> 구성-요소-및-사용-방법.md
          #     cat "$file" >> 구성-요소-및-사용-방법.md
          #     echo "" >> 구성-요소-및-사용-방법.md
          #     echo "---" >> 구성-요소-및-사용-방법.md
          #     echo "" >> 구성-요소-및-사용-방법.md
          #   fi
          # done

          # build_pdf "구성-요소-및-사용-방법.md" "구성-요소-및-사용-방법.pdf"

          # -----------------------------------------
          # 기본 블록 페이지: 병합하지 않고 각 페이지를 개별 PDF로 생성한다.
          # (아래 "나머지 Wiki 파일 개별 PDF" 루프에서 각각 처리됨)

          # -----------------------------------------
          # Wiki 파일 개별 PDF
          for file in *.md; do
            base=$(basename "$file" .md)

            # " ${GUIDE_PAGES[*]} " =~ " ${base} " || " ${USAGE_PAGES[*]} " =~ " ${base} " || 
            if [[ "$base" = "Home" || "$base" = "_Sidebar" ]]; then
              continue
            fi

            build_pdf "$file" "${base}.pdf"
          done

      - name: Commit PDF to repository
        run: |
          cd ${{ github.workspace }}

          mkdir -p MD
          mv wiki/*.md MD/

          mkdir -p PDF
          mv wiki/*.pdf PDF/

          rm -rf wiki/

          git config user.name "${COMMITTER_NAME}"
          git config user.email "${COMMITTER_EMAIL}"
          git remote set-url origin https://x-access-token:${{ env.GH_TOKEN }}@github.com/${REPO_OWNER}/${REPO_NAME}.git
          git fetch origin
          git reset --hard origin/$BRANCH
          git add PDF/*.pdf
          git add MD/*.md

          if ! git diff --staged --quiet; then
            git commit -m "Update Wiki to PDFs"
            git push origin $BRANCH
          fi
